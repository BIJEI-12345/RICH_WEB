<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP - Sign up (Step 2) • RICH</title>
  <link rel="icon" href="Images/logo_app_2.jpg" type="image/x-icon">
  <link rel="stylesheet" href="Styles/signup2.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <main class="auth">
    <header class="auth__header">
      <div class="progress">
        <span class="progress__dot progress__dot--active"></span>
        <span class="progress__dot progress__dot--active"></span>
        <span class="progress__dot"></span>
      </div>
      <img class="logo" src="Images/logo.png" alt="App logo" />
      <h1 class="header">Enter Verification Code</h1>
    </header>

    <form class="form" action="php/signup2.php" method="POST" id="otpForm" novalidate>
      <div class="form-content">
        <label class="label">
          <span class="citation">Check your email for the 6-digit verification code</span>
        </label>

        <div class="input_group">
          <input type="text" 
                 id="otpCode" 
                 name="otp_code" 
                 class="otp-input" 
                 placeholder="000000" 
                 maxlength="6"
                 pattern="\d{6}"
                 required
                 autocomplete="one-time-code">
        </div>

        <div class="resend-below-input">
          <p class="resend-countdown" id="resendCooldown" hidden></p>
          <button type="button" class="resend-text-btn" id="resendOtpBtn" aria-label="Resend verification code to your email">
            <span class="resend-text-btn__icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span id="resendOtpBtnLabel" class="resend-text-btn__label">Resend OTP</span>
          </button>
        </div>
        
        <div class="email-info">
          <strong>📧 Email:</strong> <span id="userEmail">Loading...</span><br>
          <strong>👤 Name:</strong> <span id="userName">Loading...</span>
        </div>
        
        <div class="timer-warning">
          <strong>⏰ Important:</strong> The verification code expires in 3 minutes. Please enter it as soon as possible.
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
      </div>

      <div class="form-actions">
        <a class="backButton" href="signup1.html">← Back</a>
        <button type="submit" class="verify-button" name="verify_otp">
          Verify Account
        </button>
      </div>
    </form>
 
    <script src="js/signup2.js"></script>
</body>
</html>
